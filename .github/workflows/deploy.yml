name: Deploy

# Build + prerender + deploy to Cloudflare Workers (vantage-labs).
#
# Why this exists: Cloudflare Pages' built-in build container ships
# without GUI shared libs (libatk, libnss, libgbm, ...), so Puppeteer's
# bundled Chrome can't launch and `scripts/prerender.js` skips silently.
# GitHub-hosted ubuntu-latest runners ship with Chrome preinstalled, so
# all the GUI libs are present and prerender runs every deploy.
#
# Setup required (one-time, in GitHub repo settings → Secrets and variables → Actions):
#   - CLOUDFLARE_API_TOKEN: a token with `Workers Scripts:Edit` + `Account Settings:Read`
#   - CLOUDFLARE_ACCOUNT_ID: the account ID for the vantage-labs Worker
#
# Also: disconnect the git integration in the Cloudflare dashboard for
# the vantage-labs Worker, otherwise both this workflow and Cloudflare's
# auto-build will deploy on every push (last writer wins; wasteful).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (with prerender)
        run: npm run build
        env:
          CI: 'true'

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # wrangler-action defaults to 3.90.0, which predates the
          # Workers Static Assets `not_found_handling` field. Pin a 4.x
          # release that matches what Cloudflare's managed builds use.
          wranglerVersion: '4.87.0'
          command: deploy
