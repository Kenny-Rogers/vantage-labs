<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#b15a2c" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    />

    <title>VantageLabs — Computer Vision Tools for Aerial Footage</title>
    <meta
      name="description"
      content="Extract the best frames from your drone footage. Free, private, runs entirely in your browser."
    />

    <link rel="canonical" href="https://kenny-rogers.github.io/vantage-labs/" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp, Instagram link previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="VantageLabs" />
    <meta property="og:url" content="https://kenny-rogers.github.io/vantage-labs/" />
    <meta property="og:title" content="VantageLabs — Computer Vision Tools for Aerial Footage" />
    <meta
      property="og:description"
      content="Extract the best frames from your drone footage. Free, private, runs entirely in your browser."
    />
    <meta property="og:image" content="https://kenny-rogers.github.io/vantage-labs/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="VantageLabs — Computer Vision Tools for Aerial Footage" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://kenny-rogers.github.io/vantage-labs/" />
    <meta name="twitter:title" content="VantageLabs — Computer Vision Tools for Aerial Footage" />
    <meta
      name="twitter:description"
      content="Extract the best frames from your drone footage. Free, private, runs entirely in your browser."
    />
    <meta name="twitter:image" content="https://kenny-rogers.github.io/vantage-labs/og-image.png" />
    <meta name="twitter:image:alt" content="VantageLabs — Computer Vision Tools for Aerial Footage" />

    <!-- GitHub Pages SPA fallback: 404.html sets ?/<path> in the query.
         Decode it back into a clean URL before React Router boots. -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) { return s.replace(/~and~/g, '&'); })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      }(window.location));
    </script>
  </head>
  <body>
    <noscript>VantageLabs needs JavaScript to run. Please enable it and reload.</noscript>
    <div id="root"></div>
  </body>
</html>
