<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>VantageLabs</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script type="text/javascript">
      // GitHub Pages doesn't know about client-side routes. Without this
      // file, hitting /vantage-labs/frame-extractor directly (or hard-
      // refreshing it) returns a real 404. We catch the 404, encode the
      // intended path into the query string, and redirect to index.html —
      // a tiny script in index.html then decodes it back into the URL bar
      // and lets React Router take over. (Pattern: rafgraph/spa-github-pages.)
      //
      // pathSegmentsToKeep = 1 keeps the "vantage-labs" project segment.
      // Set to 0 if this ever moves to a custom domain at the apex.
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
